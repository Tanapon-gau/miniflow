services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: miniflow
      POSTGRES_PASSWORD: miniflow
      POSTGRES_DB: miniflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miniflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://miniflow:miniflow@postgres:5432/miniflow
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "python3"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  scheduler:
    build: ./scheduler
    environment:
      DATABASE_URL: postgres://miniflow:miniflow@postgres:5432/miniflow
      REDIS_ADDR: redis:6379
    depends_on:
      api:
        condition: service_healthy

  worker-go:
    build: ./worker-go
    environment:
      DATABASE_URL: postgres://miniflow:miniflow@postgres:5432/miniflow
      REDIS_ADDR: redis:6379
    depends_on:
      api:
        condition: service_healthy

  worker-py:
    build: ./worker-py
    environment:
      DATABASE_URL: postgresql://miniflow:miniflow@postgres:5432/miniflow
      REDIS_URL: redis://redis:6379
    depends_on:
      api:
        condition: service_healthy

  web:
    build: ./web
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
